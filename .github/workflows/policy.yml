name: Repository policy

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 9 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate policy and documentation
        run: ./tools/validate-repo.sh

  go:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.25.12
          cache: true
      - name: Verify module files
        run: go mod tidy && git diff --exit-code -- go.mod go.sum
      - name: Verify protocol compatibility inventory
        run: go run ./cmd/protocol-inventory -check protocol/inventory.json
      - name: Check reachable vulnerabilities
        run: ./tools/run-govulncheck.sh
      - name: Test with race detector
        run: go test -race ./...
      - name: Fuzz framing smoke test
        run: go test ./internal/wire -run=^$ -fuzz=FuzzPlainFramerRead -fuzztime=5s
      - name: Fuzz protobuf decoding smoke test
        run: go test ./internal/wire -run=^$ -fuzz=FuzzDecode -fuzztime=5s
      - name: Vet
        run: go vet ./...
