name: Repository policy

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate policy and documentation
        run: ./tools/validate-repo.sh

  go:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.25.12
          cache: true
      - name: Verify module files
        run: go mod tidy && git diff --exit-code -- go.mod go.sum
      - name: Verify protocol compatibility inventory
        run: go run ./cmd/protocol-inventory -check protocol/inventory.json
      - name: Check reachable vulnerabilities
        run: ./tools/run-govulncheck.sh
      - name: Test with race detector
        run: go test -race ./...
      - name: Fuzz framing smoke test
        run: go test ./internal/wire -run=^$ -fuzz=FuzzPlainFramerRead -fuzztime=5s
      - name: Fuzz protobuf decoding smoke test
        run: go test ./internal/wire -run=^$ -fuzz=FuzzDecode -fuzztime=5s
      - name: Fuzz multicast DNS answer smoke test
        run: go test ./internal/mdns -run=^$ -fuzz=FuzzAnswerIP -fuzztime=5s
      - name: Vet
        run: go vet ./...
      - name: Report dependencies, checksums, and licenses
        run: ./tools/report-dependencies.sh

  fuzz-extended:
    # The weekly schedule (and a manual dispatch) runs every fuzz target for
    # longer than the pull-request smoke, but still with a finite budget. No
    # corpus, crash artifact, or log upload: a failure reproduces locally with
    # the printed input, and fixtures stay synthetic.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.25.12
          cache: true
      - name: Fuzz framing (extended)
        run: go test ./internal/wire -run=^$ -fuzz=FuzzPlainFramerRead -fuzztime=10m
      - name: Fuzz protobuf decoding (extended)
        run: go test ./internal/wire -run=^$ -fuzz=FuzzDecode -fuzztime=10m
      - name: Fuzz multicast DNS answer (extended)
        run: go test ./internal/mdns -run=^$ -fuzz=FuzzAnswerIP -fuzztime=10m

  generated-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.25.12
          cache: true
      - name: Install the pinned protobuf generator toolchain
        run: |
          curl -sSfL -o /tmp/protoc.zip \
            https://github.com/protocolbuffers/protobuf/releases/download/v31.1/protoc-31.1-linux-x86_64.zip
          echo "96553041f1a91ea0efee963cb16f462f5985b4d65365f3907414c360044d8065  /tmp/protoc.zip" | sha256sum -c -
          unzip -q /tmp/protoc.zip -d "$HOME/protoc"
          echo "$HOME/protoc/bin" >> "$GITHUB_PATH"
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Prove generated protocol files match their pinned inputs
        run: ./tools/check-generated-drift.sh
